<body>
  <div class="container">
    <div class="book-wrapper">
      <img src="/book.jpg" alt="The New God Flow" class="book">
    </div>
    
    <h1>The New God Flow</h1>
    <p class="subtitle">The Divine Signal In Hip-Hop</p>
    <p class="tagline">A book by Michael Caswell</p>
    
    <div class="form-section">
      <label class="form-label">Get notified when it ships</label>
      
      <form id="signup-form">
        <div class="form-inputs">
          <div class="form-group">
            <input 
              type="text" 
              id="firstName" 
              placeholder="First name" 
              required
            >
          </div>
          <div class="form-group">
            <input 
              type="email" 
              id="email" 
              placeholder="Email" 
              required
            >
          </div>
        </div>
        
        <button type="submit">Join the list</button>
        <div id="message" class="message"></div>
      </form>
    </div>
    
    <div class="footer">
      <p>No spam. Just the release.</p>
      <p style="margin-top:14px;"><a class="author-cta" href="/author">About the author &nbsp;&rarr;</a></p>
    </div>
  </div>

  <div class="modal-overlay" id="success-modal">
    <div class="modal">
      <div class="check">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#000" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <h3>You're on the list</h3>
      <p>Check your inbox for a confirmation. While you're here, want to learn about the author?</p>
      <a class="modal-btn primary" href="/author">Learn about the author</a>
      <button class="modal-btn secondary" id="modal-close">Maybe later</button>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('signup-form');
    const messageEl = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const firstName = document.getElementById('firstName').value.trim();
      const button = form.querySelector('button');
      
      messageEl.textContent = '';
      messageEl.className = 'message';
      button.disabled = true;
      
      try {
        const res = await fetch('https://api.thenewgodflow.com/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, firstName })
        });
        
        const data = await res.json();
        
        if (data.success || data.message) {
          messageEl.textContent = data.message || 'You\'re in!';
          messageEl.className = 'message success';
          form.reset();
          document.getElementById('success-modal').classList.add('shown');
          setTimeout(() => {
            messageEl.textContent = '';
            button.disabled = false;
          }, 4000);
        } else {
          throw new Error(data.error || 'Something went wrong');
        }
      } catch (err) {
        messageEl.textContent = err.message || 'Error subscribing. Please try again.';
        messageEl.className = 'message error';
        button.disabled = false;
      }
    });

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('success-modal').classList.remove('shown');
    });
    document.getElementById('success-modal').addEventListener('click', (e) => {
      if (e.target.id === 'success-modal') e.target.classList.remove('shown');
    });
  </script>
</body>
