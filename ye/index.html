<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>&middot;</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%2300d4ff'/><stop offset='50%25' style='stop-color:%23a366ff'/><stop offset='100%25' style='stop-color:%23ff00cc'/></linearGradient></defs><rect width='100' height='100' fill='%23060606'/><rect x='20' y='15' width='60' height='70' rx='3' fill='url(%23g)' opacity='0.9'/></svg>">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg,#060606 0%,#0a0a0a 50%,#050505 100%);
      color:#fff; min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      line-height:1.6; display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .gate, .reveal { width:100%; max-width:340px; text-align:center; display:flex; flex-direction:column; align-items:center; }
    .reveal { display:none; }
    .reveal.shown { display:flex; animation:fade .5s ease; }
    .gate.hidden { display:none; }
    @keyframes fade { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .lock { width:44px; height:44px; margin-bottom:22px; border-radius:10px; background:linear-gradient(135deg,#00d4ff,#a366ff); opacity:.92; display:flex; align-items:center; justify-content:center; }
    .lock svg { width:22px; height:22px; }
    .prompt { font-weight:300; font-size:17px; color:#bbb; margin-bottom:24px; letter-spacing:.3px; }
    input { width:100%; padding:13px 16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:6px; color:#fff; font-size:16px; text-align:center; letter-spacing:3px; font-family:inherit; transition:all .2s ease; }
    input::placeholder { color:#555; letter-spacing:1px; }
    input:focus { outline:none; border-color:rgba(0,212,255,.6); background:rgba(0,212,255,.03); box-shadow:0 0 0 3px rgba(0,212,255,.1); }
    .unlock-btn { margin-top:14px; width:100%; padding:13px; background:linear-gradient(135deg,#00d4ff,#a366ff); border:none; border-radius:6px; color:#000; font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:1px; cursor:pointer; font-family:inherit; transition:all .2s ease; }
    .unlock-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,212,255,.3); }
    .err { color:#ff6b6b; font-size:13px; margin-top:16px; min-height:18px; }
    .reveal .msg {
      font-size:32px; font-weight:300; letter-spacing:-.5px; margin-bottom:30px;
      background:linear-gradient(135deg,#fff 0%,#a8d8ff 50%,#ff88ff 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .reveal .actions { display:flex; gap:12px; width:100%; }
    .reveal a.action {
      flex:1; padding:15px 0; border-radius:8px; text-decoration:none;
      font-size:15px; font-weight:600; letter-spacing:.5px; transition:all .2s ease;
    }
    .reveal a.call { background:linear-gradient(135deg,#00d4ff,#a366ff); color:#000; }
    .reveal a.call:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,212,255,.3); }
    .reveal a.text { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.12); color:#fff; }
    .reveal a.text:hover { border-color:rgba(0,212,255,.5); background:rgba(0,212,255,.05); }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
    <p class="prompt">Check your DMs for the password</p>
    <input id="pw" type="password" placeholder="Password" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button class="unlock-btn" id="go">Unlock</button>
    <div class="err" id="err"></div>
  </div>

  <div class="reveal" id="reveal">
    <p class="msg">bro let's have dinner</p>
    <div class="actions">
      <a class="action call" href="tel:+16046714096">Call</a>
      <a class="action text" href="sms:+16046714096">Text</a>
    </div>
  </div>

  <script>
    var PW_HASH='cde4e100efd26f5b02fb484e30db927732ca192f1cd9975186510adec82b5c61';
    var gate=document.getElementById('gate'), reveal=document.getElementById('reveal');
    var input=document.getElementById('pw'), errEl=document.getElementById('err');
    function show(){ gate.classList.add('hidden'); reveal.classList.add('shown'); }
    if(sessionStorage.getItem('tngf_ye')==='1'){ show(); }
    async function sha256(s){ var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
    async function check(){ var h=await sha256(input.value.trim().toLowerCase()); if(h===PW_HASH){ sessionStorage.setItem('tngf_ye','1'); show(); } else { errEl.textContent='Incorrect password'; input.value=''; input.focus(); } }
    document.getElementById('go').addEventListener('click', check);
    input.addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });
    input.focus();
  </script>
</body>
</html>
